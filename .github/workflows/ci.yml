name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to a PR cancels the previous in-flight run for that PR.
# Pushes to main are never cancelled.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Configure git identity
        # Several integration tests shell out to `git commit`, which fails
        # without a configured user.
        run: |
          git config --global user.email "ci@git-agecrypt.test"
          git config --global user.name "git-agecrypt CI"
          git config --global init.defaultBranch main
        shell: bash
      - run: cargo test --all --no-fail-fast

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Configure git identity
        run: |
          git config --global user.email "ci@git-agecrypt.test"
          git config --global user.name "git-agecrypt CI"
          git config --global init.defaultBranch main
      - name: Generate lcov + summary
        run: |
          cargo llvm-cov --all --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
      - name: Upload coverage artifacts
        # Each CI run produces a downloadable lcov.info plus a per-file
        # summary. No external coverage service is configured.
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            lcov.info
            coverage-summary.txt

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
